services:
    api:
        build:
            context: .
            target: production
            args:
                NODE_IMAGE: node:24-slim
        image: nodejs-express-typescript-api-starter:local
        restart: unless-stopped
        stop_grace_period: 15s
        environment:
            NODE_ENV: production
            PORT: 3000
            MONGODB_URI: ${MONGODB_URI:?Set MONGODB_URI in .env before starting Docker Compose}
            JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env before starting Docker Compose}
            JWT_EXPIRATION_TIME: ${JWT_EXPIRATION_TIME:-1h}
            CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
            RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES:-1}
            RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-60}
            TRUST_PROXY_HOPS: ${TRUST_PROXY_HOPS:-0}
            LOG_LEVEL: ${LOG_LEVEL:-info}
        ports:
            - "${PORT:-3000}:3000"
        healthcheck:
            test:
                [
                    "CMD",
                    "node",
                    "-e",
                    "fetch('http://127.0.0.1:3000/v1/health').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 10s

        depends_on:
            mongo:
                condition: service_healthy

    mongo:
        image: mongo:8.0
        restart: unless-stopped
        ports:
            - "27017:27017"
        volumes:
            - mongo-data:/data/db
        healthcheck:
            test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
            interval: 30s
            timeout: 5s
            retries: 5
            start_period: 10s

volumes:
    mongo-data:
