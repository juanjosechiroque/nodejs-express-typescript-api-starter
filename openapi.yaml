openapi: 3.1.0
info:
    title: Node.js Express TypeScript API Starter
    version: 1.0.0
    description: REST API starter with auth, product routes, validation, request tracing, and standard response shapes.
servers:
    - url: http://localhost:3000

paths:
    /:
        parameters:
            - $ref: "#/components/parameters/XRequestId"
        get:
            summary: API status
            operationId: getRootStatus
            responses:
                "200":
                    description: API is running
                    headers:
                        x-request-id:
                            $ref: "#/components/headers/XRequestId"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/RootStatus"

    /v1/health:
        parameters:
            - $ref: "#/components/parameters/XRequestId"
        get:
            summary: Health check
            operationId: getHealth
            responses:
                "200":
                    description: Service is healthy
                    headers:
                        x-request-id:
                            $ref: "#/components/headers/XRequestId"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/HealthResponse"
                "503":
                    description: Service is degraded
                    headers:
                        x-request-id:
                            $ref: "#/components/headers/XRequestId"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/HealthResponse"

    /v1/auth/signup:
        parameters:
            - $ref: "#/components/parameters/XRequestId"
        post:
            summary: Register a user
            operationId: signup
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AuthRequest"
            responses:
                "201":
                    description: User registered
                    headers:
                        x-request-id:
                            $ref: "#/components/headers/XRequestId"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AuthResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"

    /v1/auth/login:
        parameters:
            - $ref: "#/components/parameters/XRequestId"
        post:
            summary: Authenticate a user
            operationId: login
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/AuthRequest"
            responses:
                "200":
                    description: Login successful
                    headers:
                        x-request-id:
                            $ref: "#/components/headers/XRequestId"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/AuthResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"

    /v1/products:
        parameters:
            - $ref: "#/components/parameters/XRequestId"
        get:
            summary: List products
            operationId: listProducts
            parameters:
                - name: limit
                  in: query
                  schema:
                      type: integer
                      minimum: 1
                      maximum: 100
                      default: 10
                - name: cursor
                  in: query
                  description: MongoDB ObjectId cursor for pagination
                  schema:
                      type: string
                      pattern: "^[0-9a-fA-F]{24}$"
                - name: status
                  in: query
                  schema:
                      $ref: "#/components/schemas/ProductStatus"
                - name: isFeatured
                  in: query
                  schema:
                      type: boolean
            responses:
                "200":
                    description: Products retrieved
                    headers:
                        x-request-id:
                            $ref: "#/components/headers/XRequestId"
                    content:
                        application/json:
                            schema:
                                $ref: "#/components/schemas/ProductListResponse"
                "400":
                    $ref: "#/components/responses/BadRequest"
        post:
            summary: Create a product
            operationId: createProduct
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CreateProductRequest"
            responses:
                "201":
                    description: Product created
                    headers:
                        x-request-id:
                            $ref: "#/components/headers/XRequestId"
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              $ref: "#/components/schemas/Product"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"

    /v1/products/{id}:
        parameters:
            - $ref: "#/components/parameters/XRequestId"
            - $ref: "#/components/parameters/ProductId"
        get:
            summary: Get a product by ID
            operationId: getProductById
            responses:
                "200":
                    description: Product retrieved
                    headers:
                        x-request-id:
                            $ref: "#/components/headers/XRequestId"
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              $ref: "#/components/schemas/Product"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "404":
                    $ref: "#/components/responses/NotFound"
        patch:
            summary: Partially update a product
            operationId: updateProduct
            security:
                - bearerAuth: []
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/UpdateProductRequest"
            responses:
                "200":
                    description: Product updated
                    headers:
                        x-request-id:
                            $ref: "#/components/headers/XRequestId"
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              $ref: "#/components/schemas/Product"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"
        delete:
            summary: Delete a product
            operationId: deleteProduct
            description: Active products must be archived before deletion.
            security:
                - bearerAuth: []
            responses:
                "200":
                    description: Product deleted
                    headers:
                        x-request-id:
                            $ref: "#/components/headers/XRequestId"
                    content:
                        application/json:
                            schema:
                                allOf:
                                    - $ref: "#/components/schemas/SuccessResponse"
                                    - type: object
                                      properties:
                                          data:
                                              $ref: "#/components/schemas/Product"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "404":
                    $ref: "#/components/responses/NotFound"

components:
    securitySchemes:
        bearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT

    parameters:
        XRequestId:
            name: x-request-id
            in: header
            required: false
            description: Optional client-provided request correlation ID. A UUID is generated when omitted.
        ProductId:
            name: id
            in: path
            required: true
            description: MongoDB ObjectId
            schema:
                type: string
                pattern: "^[0-9a-fA-F]{24}$"

    headers:
        XRequestId:
            description: Request correlation ID used in logs.
            schema:
                type: string

    responses:
        BadRequest:
            description: Validation or business rule error
            headers:
                x-request-id:
                    $ref: "#/components/headers/XRequestId"
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        Unauthorized:
            description: Missing or invalid JWT
            headers:
                x-request-id:
                    $ref: "#/components/headers/XRequestId"
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"
        NotFound:
            description: Resource not found
            headers:
                x-request-id:
                    $ref: "#/components/headers/XRequestId"
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/ErrorResponse"

    schemas:
        RootStatus:
            type: object
            required: [status]
            properties:
                status:
                    type: string
                    enum: [running]

        HealthResponse:
            type: object
            required: [status, uptime, timestamp, services]
            properties:
                status:
                    type: string
                    enum: [healthy, degraded]
                uptime:
                    type: number
                timestamp:
                    type: string
                    format: date-time
                services:
                    type: object
                    required: [db]
                    properties:
                        db:
                            type: string
                            enum: [connected, disconnected]

        AuthRequest:
            type: object
            required: [email, password]
            properties:
                email:
                    type: string
                    format: email
                    maxLength: 254
                password:
                    type: string
                    minLength: 8
                    maxLength: 72

        AuthResponse:
            type: object
            required: [status, message, data]
            properties:
                status:
                    type: integer
                message:
                    type: string
                data:
                    type: string
                    description: JWT access token

        ProductStatus:
            type: string
            enum: [draft, active, archived]

        Product:
            type: object
            additionalProperties: false
            required: [id, name, price, stock, status, isFeatured, createdAt, updatedAt]
            properties:
                id:
                    type: string
                    description: MongoDB ObjectId
                    pattern: "^[0-9a-fA-F]{24}$"
                name:
                    type: string
                    minLength: 1
                    maxLength: 120
                description:
                    type: string
                    maxLength: 2000
                price:
                    type: number
                    exclusiveMinimum: 0
                    maximum: 999999999
                stock:
                    type: integer
                    minimum: 0
                    maximum: 1000000000
                status:
                    $ref: "#/components/schemas/ProductStatus"
                isFeatured:
                    type: boolean
                createdAt:
                    type: string
                    format: date-time
                updatedAt:
                    type: string
                    format: date-time

        CreateProductRequest:
            type: object
            required: [name, price]
            properties:
                name:
                    type: string
                    minLength: 1
                    maxLength: 120
                description:
                    type: string
                    maxLength: 2000
                price:
                    type: number
                    exclusiveMinimum: 0
                    maximum: 999999999
                stock:
                    type: integer
                    minimum: 0
                    maximum: 1000000000
                    default: 0
                status:
                    $ref: "#/components/schemas/ProductStatus"
                isFeatured:
                    type: boolean
                    default: false

        UpdateProductRequest:
            type: object
            minProperties: 1
            description: At least one field must be provided.
            properties:
                name:
                    type: string
                    minLength: 1
                    maxLength: 120
                description:
                    type: string
                    maxLength: 2000
                price:
                    type: number
                    exclusiveMinimum: 0
                    maximum: 999999999
                stock:
                    type: integer
                    minimum: 0
                    maximum: 1000000000
                status:
                    $ref: "#/components/schemas/ProductStatus"
                isFeatured:
                    type: boolean

        Pagination:
            type: object
            required: [limit, nextCursor, hasMore]
            properties:
                limit:
                    type: integer
                nextCursor:
                    type: ["string", "null"]
                    description: MongoDB ObjectId for the next page, or null when there are no more results
                hasMore:
                    type: boolean

        ProductListData:
            type: object
            required: [items, pagination]
            properties:
                items:
                    type: array
                    items:
                        $ref: "#/components/schemas/Product"
                pagination:
                    $ref: "#/components/schemas/Pagination"

        ProductListResponse:
            type: object
            required: [status, message, data]
            properties:
                status:
                    type: integer
                message:
                    type: string
                data:
                    $ref: "#/components/schemas/ProductListData"

        SuccessResponse:
            type: object
            required: [status, message, data]
            properties:
                status:
                    type: integer
                message:
                    type: string
                data: {}

        ErrorDetail:
            type: object
            required: [field, error]
            properties:
                field:
                    type: string
                error:
                    type: string

        ErrorResponse:
            type: object
            required: [status, code, message]
            properties:
                status:
                    type: integer
                code:
                    type: string
                message:
                    type: string
                details:
                    type: array
                    items:
                        $ref: "#/components/schemas/ErrorDetail"
                stack:
                    type: string
                    description: Included in non-production environments only
