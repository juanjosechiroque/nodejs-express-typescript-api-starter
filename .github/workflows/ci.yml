name: Build Main

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:

concurrency:
    group: build-deploy-main-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    IMAGE_NAME: nodejs-express-api-boilerplate

jobs:
    build-and-deploy:
        name: Validate, test, and build
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Setup Node.js
              uses: actions/setup-node@v7
              with:
                  node-version: "24"
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Audit dependencies
              run: npm audit --audit-level=high

            - name: Lint and format check
              run: npm run validate

            - name: Typecheck
              run: npm run typecheck

            - name: Build application
              run: npm run build

            - name: Run tests with coverage
              run: npm run test:coverage

            - name: Run MongoDB integration tests
              run: npm run test:integration

            - name: Resolve image tag
              id: commit
              run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

            - name: Build Docker image
              run: |
                  docker buildx create --use
                  docker buildx build \
                    -t ${{ env.IMAGE_NAME }}:${{ steps.commit.outputs.sha }} \
                    --load .

            - name: Verify non-root container runtime
              run: |
                  docker run --rm --entrypoint node \
                    ${{ env.IMAGE_NAME }}:${{ steps.commit.outputs.sha }} \
                    -e "if (process.getuid?.() === 0) process.exit(1); console.log('non-root uid:', process.getuid?.())"
